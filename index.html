<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Mini Juegos Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .menu {
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #000;
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            background-color: rgba(232, 244, 248, 0.2);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            color: #fff;
            font-size: 14px;
        }

        #score {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Mini Juegos Web</h1>
        
        <div class="menu">
            <button onclick="startSnakeGame()">🐍 Juego: Snake</button>
            <button onclick="clearGame()">🗑️ Limpiar</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400" style="display: none;"></canvas>
        <div id="score" style="display: none;"></div>
        
        <div class="instructions" id="instructions">
            <p>👈 Haz clic en "Juego: Snake" para empezar</p>
            <p>⬅️ Usa las flechas del teclado para moverte</p>
            <p>🍎 Come el punto rojo para ganar puntos</p>
        </div>
    </div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let gameRunning = false;
        let gameActive = false;

        // ===== JUEGO SNAKE =====
        let canvas = null;
        let ctx = null;
        const box = 20;
        let snake = [];
        let direction = "RIGHT";
        let nextDirection = "RIGHT";
        let score = 0;
        let food = {};
        let gameInterval = null;

        function startSnakeGame() {
            // Mostrar canvas
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.style.display = 'block';
            document.getElementById('score').style.display = 'block';
            document.getElementById('instructions').style.display = 'none';

            // Reiniciar variables
            snake = [{ x: 9 * box, y: 9 * box }];
            direction = "RIGHT";
            nextDirection = "RIGHT";
            score = 0;
            gameRunning = true;
            gameActive = true;

            // Generar comida aleatoria
            food = {
                x: Math.floor(Math.random() * 19 + 1) * box,
                y: Math.floor(Math.random() * 19 + 1) * box
            };

            // Limpiar intervalo anterior si existe
            if (gameInterval) clearInterval(gameInterval);

            // Empezar el juego
            gameInterval = setInterval(updateGame, 100);
        }

        function clearGame() {
            gameRunning = false;
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);
            
            canvas = document.getElementById('gameCanvas');
            if (canvas) canvas.style.display = 'none';
            
            document.getElementById('score').style.display = 'none';
            document.getElementById('instructions').style.display = 'block';
        }

        // Detectar teclas presionadas
        document.addEventListener('keydown', function(event) {
            if (!gameActive) return;

            if (event.key === 'ArrowLeft' && direction !== 'RIGHT') {
                nextDirection = 'LEFT';
            } else if (event.key === 'ArrowUp' && direction !== 'DOWN') {
                nextDirection = 'UP';
            } else if (event.key === 'ArrowRight' && direction !== 'LEFT') {
                nextDirection = 'RIGHT';
            } else if (event.key === 'ArrowDown' && direction !== 'UP') {
                nextDirection = 'DOWN';
            }
        });

        function updateGame() {
            if (!gameRunning) return;

            direction = nextDirection;

            // Obtener cabeza actual
            let head = { x: snake[0].x, y: snake[0].y };

            // Calcular nueva posición
            if (direction === 'LEFT') head.x -= box;
            if (direction === 'UP') head.y -= box;
            if (direction === 'RIGHT') head.x += box;
            if (direction === 'DOWN') head.y += box;

            // Verificar colisión con bordes
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                endGame();
                return;
            }

            // Verificar colisión consigo misma
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Verificar si comió
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            drawGame();
        }

        function drawGame() {
            // Limpiar canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar grid
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= canvas.width; i += box) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Dibujar serpiente
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    ctx.fillStyle = '#00ff00';
                } else {
                    ctx.fillStyle = '#00aa00';
                }
                ctx.fillRect(snake[i].x + 1, snake[i].y + 1, box - 2, box - 2);
            }

            // Dibujar comida
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(food.x + box / 2, food.y + box / 2, box / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Actualizar puntuación
            document.getElementById('score').textContent = '📊 Puntuación: ' + score;
        }

        function endGame() {
            gameRunning = false;
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);

            // Dibujar "GAME OVER"
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 25px Arial';
            ctx.fillText('Puntuación: ' + score, canvas.width / 2, canvas.height / 2 + 30);
        }
    </script>
</body>
</html>
