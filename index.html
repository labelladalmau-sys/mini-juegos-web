<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Mini Juegos Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 900px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .menu {
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #000;
            display: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .right-panel {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            min-width: 250px;
        }

        #score {
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff00;
        }

        .leaderboard {
            text-align: left;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .leaderboard h3 {
            color: #FFD700;
            margin-bottom: 10px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-size: 14px;
        }

        .score-position {
            color: #FFD700;
            font-weight: bold;
            min-width: 30px;
        }

        .score-position.first {
            color: #FFD700;
        }

        .score-position.second {
            color: #C0C0C0;
        }

        .score-position.third {
            color: #CD7F32;
        }

        .instructions {
            background-color: rgba(232, 244, 248, 0.2);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            color: #fff;
            font-size: 14px;
        }

        #debug {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Mini Juegos Web - Snake</h1>
        
        <div class="menu">
            <button onclick="startSnakeGame()">🐍 Iniciar Juego</button>
            <button onclick="clearGame()">🗑️ Limpiar</button>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="right-panel">
                <div id="score">📊 Puntuación: 0</div>
                <div id="debug">Usa las flechas: ⬅️ ⬆️ ➡️ ⬇️</div>
                
                <div class="leaderboard">
                    <h3>🏆 Top 10 Scores</h3>
                    <div id="leaderboardList">
                        <div class="score-item">
                            <span>Juega para obtener puntuaciones</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="instructions" id="instructions">
            <p>👈 Haz clic en "Iniciar Juego" para empezar</p>
            <p>⬅️ Usa las flechas del teclado para moverte</p>
            <p>🍎 Come el punto rojo para ganar puntos</p>
            <p><strong>¡Evita los bordes y no chokes contigo misma!</strong></p>
        </div>
    </div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let gameRunning = false;
        let canvas = null;
        let ctx = null;
        const box = 20;
        let snake = [];
        let food = {};
        let score = 0;
        let gameInterval = null;
        
        // Variables de dirección
        let currentDirection = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };

        // Array de scores (máximo 10)
        let topScores = JSON.parse(localStorage.getItem('snakeTopScores')) || [];

        // Detectar teclas presionadas
        window.addEventListener('keydown', function(e) {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowLeft':
                    if (currentDirection.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                        e.preventDefault();
                    }
                    break;
                case 'ArrowRight':
                    if (currentDirection.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                        e.preventDefault();
                    }
                    break;
                case 'ArrowUp':
                    if (currentDirection.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                        e.preventDefault();
                    }
                    break;
                case 'ArrowDown':
                    if (currentDirection.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                        e.preventDefault();
                    }
                    break;
            }
        });

        function startSnakeGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.style.display = 'block';
            document.querySelector('.right-panel').style.display = 'block';
            document.getElementById('debug').style.display = 'block';
            document.getElementById('instructions').style.display = 'none';

            // Reiniciar variables
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            currentDirection = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameRunning = true;

            generateFood();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 150);
            
            canvas.focus();
        }

        function generateFood() {
            let newFood;
            let foodOnSnake = true;
            
            while (foodOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * (canvas.width / box)),
                    y: Math.floor(Math.random() * (canvas.height / box))
                };
                
                foodOnSnake = snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            food = newFood;
        }

        function gameLoop() {
            if (!gameRunning) return;

            currentDirection = nextDirection;

            const head = { ...snake[0] };
            head.x += currentDirection.x;
            head.y += currentDirection.y;

            if (head.x < 0 || head.x >= canvas.width / box || 
                head.y < 0 || head.y >= canvas.height / box) {
                endGame('¡Chocaste con la pared!');
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame('¡Te comiste a ti misma!');
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
            } else {
                snake.pop();
            }

            document.getElementById('score').textContent = '📊 Puntuación: ' + score;
            draw();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#111';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= canvas.width; i += box) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#00ff00' : '#00aa00';
                ctx.fillRect(snake[i].x * box + 1, snake[i].y * box + 1, box - 2, box - 2);
                ctx.strokeStyle = '#00ff00';
                ctx.strokeRect(snake[i].x * box, snake[i].y * box, box, box);
            }

            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(food.x * box + box / 2, food.y * box + box / 2, box / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function endGame(reason) {
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);

            // Guardar score
            addScore(score);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 16px Arial';
            ctx.fillText(reason, canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 25px Arial';
            ctx.fillText('Puntuación: ' + score, canvas.width / 2, canvas.height / 2 + 50);
        }

        function addScore(newScore) {
            topScores.push({
                score: newScore,
                date: new Date().toLocaleDateString()
            });

            // Ordenar de mayor a menor
            topScores.sort((a, b) => b.score - a.score);

            // Mantener solo los top 10
            topScores = topScores.slice(0, 10);

            // Guardar en localStorage
            localStorage.setItem('snakeTopScores', JSON.stringify(topScores));

            // Actualizar la tabla
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const leaderboardList = document.getElementById('leaderboardList');
            leaderboardList.innerHTML = '';

            if (topScores.length === 0) {
                leaderboardList.innerHTML = '<div class="score-item"><span>Juega para obtener puntuaciones</span></div>';
                return;
            }

            topScores.forEach((item, index) => {
                let medal = '';
                let positionClass = '';
                
                if (index === 0) {
                    medal = '🥇';
                    positionClass = 'first';
                } else if (index === 1) {
                    medal = '🥈';
                    positionClass = 'second';
                } else if (index === 2) {
                    medal = '🥉';
                    positionClass = 'third';
                } else {
                    medal = `#${index + 1}`;
                    positionClass = '';
                }

                const scoreItem = document.createElement('div');
                scoreItem.className = 'score-item';
                scoreItem.innerHTML = `
                    <span class="score-position ${positionClass}">${medal}</span>
                    <span>${item.score} pts</span>
                    <span style="font-size: 12px; color: #aaa;">${item.date}</span>
                `;
                leaderboardList.appendChild(scoreItem);
            });
        }

        function clearGame() {
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            
            canvas = document.getElementById('gameCanvas');
            if (canvas) canvas.style.display = 'none';
            
            document.querySelector('.right-panel').style.display = 'none';
            document.getElementById('debug').style.display = 'none';
            document.getElementById('instructions').style.display = 'block';
        }

        // Cargar scores al iniciar
        updateLeaderboard();
    </script>
</body>
</html>
